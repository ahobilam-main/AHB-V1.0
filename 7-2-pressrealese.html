<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Release - Ahobila Temple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f6; /* Very light stone/off-white */
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Subtle continuous fade for the 'updating' pulse */
        @keyframes subtlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-subtle-pulse {
            animation: subtlePulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-lg bg-white rounded-xl shadow-2xl shadow-orange-900/5 overflow-hidden border border-orange-100">
        
        <!-- Top decorative traditional accent line -->
        <div class="h-1 w-full bg-gradient-to-r from-orange-300 via-red-600 to-orange-300"></div>

        <div class="px-6 py-8 flex flex-col items-center text-center">
            
            <!-- Subtle Icon/Ornament -->
            <div class="mb-4">
                <img src="https://ahobilam-main.github.io/AHB-TEMPLE-IMAGES/AHB42-NAMAM.png" alt="Ahobila Temple Namam" class="h-12 w-auto mx-auto drop-shadow-md">
            </div>

            <p class="text-[10px] font-semibold tracking-[0.2em] text-orange-600 uppercase mb-1">Sri Ahobila Temple</p>
            <h1 class="text-xl font-medium tracking-wide text-stone-800 mb-6">Press Release</h1>

            <div class="w-full bg-orange-50/50 rounded-lg p-5 border border-orange-100/50">
                
                <!-- Status indicator -->
                <div class="flex items-center justify-center gap-2 mb-3">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                    </span>
                    <span class="text-xs font-medium text-orange-700 uppercase tracking-wider">Status: Updating</span>
                </div>

                <!-- Core message with small typography -->
                <p class="text-sm text-stone-600 leading-relaxed mb-2">
                    Press releases are currently being updated.
                </p>
                <p class="text-xs text-stone-500 leading-relaxed max-w-sm mx-auto">
                    Please stay in touch. We will update any new press releases and official announcements directly on this page very soon.
                </p>
            </div>

        </div>
    </main>

</body>
</html>
