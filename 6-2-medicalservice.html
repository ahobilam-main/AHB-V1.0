<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Services Ahobilam</title>
<style>
body{font-family:sans-serif;margin:0;padding:20px;background-color:#f9f9f9;color:#333;display:flex;justify-content:center;align-items:center;min-height:100vh;}

/* CM001 - Card Layout */
div#card{background-color:#fff;border-radius:10px;box-shadow:0 4px 8px rgba(0,0,0,0.1);padding:20px;width:100%;max-width:350px;text-align:center;}

/* CM002 - Service Sections */
div.service-section{padding:15px 0;border-bottom:1px solid #eaeaea;}
div.service-section:last-of-type{border-bottom:none;}

/* CM003 - Typography */
h2.service-title{font-size:18px;margin:0 0 5px 0;color:#2c3e50;display:flex;align-items:center;justify-content:center;gap:8px;}
p.service-desc{font-size:14px;margin:0 0 8px 0;color:#7f8c8d;}
span.free-tag{background-color:#27ae60;color:#fff;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold;}

/* CM004 - Stylish Red Plus */
span.red-plus{color:#e74c3c;font-size:24px;font-weight:900;text-shadow:0 2px 4px rgba(231,76,60,0.3);}

/* CM005 - Contact Section */
div.contact-section{background-color:#e8f4f8;padding:15px;border-radius:8px;margin-top:10px;}
p.contact-header{font-size:13px;font-weight:bold;color:#2980b9;margin:0 0 5px 0;}
p.contact-sub{font-size:14px;margin:0 0 5px 0;color:#34495e;}
p.contact-number{font-size:20px;font-weight:bold;color:#c0392b;margin:0;}
</style>
</head>
<body>

<!-- CM006 - Main Card -->
<div id="card">

<!-- CM007 - PHC Section -->
<div class="service-section">
<h2 class="service-title">Primary Health Center (PHC)</h2>
<p class="service-desc">Lower Ahobilam</p>
<span class="free-tag">FREE</span>
</div>

<!-- CM008 - Govt Ayurvedic Hospital Section -->
<div class="service-section">
<h2 class="service-title"><span class="red-plus">+</span> Government Ayurvedic Hospital</h2>
<p class="service-desc">Opp. Temple Office</p>
<span class="free-tag">FREE</span>
</div>

<!-- CM009 - Contact Info -->
<div class="contact-section">
<p class="contact-header">24/7 PRIMARY HEALTHCARE</p>
<p class="contact-sub">Govt. Ayurvedic Hospital</p>
<p class="contact-number">919-919-66695</p>
</div>

</div>

<script>
// CM010 - Scripts
console.log("Medical Services loaded.");
</script>
</body>
</html>
